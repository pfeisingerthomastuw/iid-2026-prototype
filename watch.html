<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHEN Watch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #111;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow', sans-serif;
    }

    /* ── Watch shell ── */
    #watch {
      width: 390px; height: 460px;
      background: #1C1C1E;
      border-radius: 110px;
      position: relative; overflow: hidden;
      box-shadow:
        0 0 0 6px #2C2C2E,
        0 0 0 8px #3A3A3C,
        0 0 0 10px #1C1C1E,
        0 30px 80px rgba(0,0,0,0.7),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }

    /* ── Screen transitions ── */
    .watch-screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center;
      opacity: 0; pointer-events: none;
      transform: scale(.96);
      transition: opacity .22s ease, transform .22s ease;
    }
    .watch-screen.active { opacity: 1; pointer-events: all; transform: scale(1); }
    .watch-screen.exit   { opacity: 0; transform: scale(1.04); pointer-events: none; }

    /* ── Shared animations ── */
    @keyframes pop-in   { from { transform: scale(.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes fade-in  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes breathe  { 0%,100% { filter: brightness(1); } 50% { filter: brightness(1.12); } }

    /* ══════════════════════════════════════
       SCREEN 1 — WATCH FACE
    ══════════════════════════════════════ */
    #screen-face {
      background: #1C1C1E;
      justify-content: space-between;
      padding: 38px 28px 36px;
    }

    .wf-top {
      width: 100%; display: flex; align-items: center; justify-content: space-between;
    }
    .wf-logo {
      font-size: 13px; font-weight: 900; letter-spacing: 3px; color: #D32F2F;
    }
    .wf-gps {
      display: flex; align-items: center; gap: 5px;
      font-size: 9px; font-weight: 700; letter-spacing: 1px; color: rgba(255,255,255,0.4);
    }
    .gps-dot {
      width: 5px; height: 5px; background: #43A047; border-radius: 50%;
      animation: gps-pulse 2.4s ease-in-out infinite;
    }
    @keyframes gps-pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(67,160,71,.5); }
      50%      { box-shadow: 0 0 0 3px rgba(67,160,71,0); }
    }

    /* Heat ring */
    .wf-ring-wrap {
      position: relative; width: 220px; height: 220px; flex-shrink: 0;
    }
    .wf-ring-wrap svg { transform: rotate(-90deg); }
    .ring-bg   { fill: none; stroke: rgba(255,255,255,0.07); stroke-width: 10; }
    .ring-fill {
      fill: none; stroke: #D32F2F; stroke-width: 10; stroke-linecap: round;
      stroke-dasharray: 628.3;
      transition: stroke-dashoffset 1.4s cubic-bezier(.4,0,.2,1);
      filter: drop-shadow(0 0 8px rgba(211,47,47,0.6));
    }
    .wf-ring-content {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 2px;
    }
    .wf-risk-label {
      font-size: 9px; font-weight: 800; letter-spacing: 2.5px; color: rgba(255,255,255,0.4);
      text-transform: uppercase;
    }
    .wf-pct {
      font-family: 'DM Mono', monospace;
      font-size: 58px; font-weight: 700; line-height: 1;
      color: #fff;
    }
    .wf-risk-level {
      font-size: 10px; font-weight: 700; letter-spacing: 1.5px; color: #EF9A9A;
    }

    /* Health row */
    .wf-health {
      width: 100%; display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.05); border-radius: 20px; padding: 10px 16px;
    }
    .wf-health-left { display: flex; align-items: center; gap: 8px; }
    .wf-bpm {
      font-family: 'DM Mono', monospace;
      font-size: 22px; font-weight: 700; color: #fff; line-height: 1;
    }
    .wf-bpm-label { font-size: 9px; font-weight: 600; color: rgba(255,255,255,0.4); letter-spacing: 1px; margin-top: 2px; }
    .wf-ekg-mini { width: 60px; height: 22px; overflow: hidden; }
    .wf-ekg-mini svg { width: 100%; height: 100%; }
    .ekg-line-mini {
      fill: none; stroke: #EF9A9A; stroke-width: 1.5;
      stroke-linecap: round; stroke-linejoin: round;
    }
    .ekg-scroll-mini { animation: ekg-move 4s linear infinite; }
    @keyframes ekg-move { from { transform: translateX(0); } to { transform: translateX(-50%); } }

    /* SOS button */
    .wf-sos {
      width: 100%; height: 56px;
      background: #D32F2F; border: none; border-radius: 18px;
      font-family: 'Barlow', sans-serif;
      font-size: 16px; font-weight: 900; letter-spacing: 3px; color: #fff;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(211,47,47,0.45);
      transition: transform .12s, background .12s;
      flex-shrink: 0;
    }
    .wf-sos:active { transform: scale(.96); background: #B71C1C; }

    /* ══════════════════════════════════════
       SCREEN 2 — SOS HOLD
    ══════════════════════════════════════ */
    #screen-sos {
      background: linear-gradient(160deg, #C62828 0%, #6B0000 100%);
      animation: breathe 3s ease-in-out infinite;
      justify-content: center; gap: 0;
      padding: 36px 28px;
    }

    .sos-label {
      font-size: 10px; font-weight: 800; letter-spacing: 3px;
      color: rgba(255,255,255,0.6); margin-bottom: 28px;
    }

    /* Hold ring */
    .sos-ring-wrap {
      position: relative; width: 200px; height: 200px; flex-shrink: 0;
      margin-bottom: 28px;
    }
    .sos-ring-wrap svg { transform: rotate(-90deg); }
    .hold-bg   { fill: none; stroke: rgba(255,255,255,0.15); stroke-width: 8; }
    .hold-arc  {
      fill: none; stroke: #fff; stroke-width: 8; stroke-linecap: round;
      stroke-dasharray: 565.5; stroke-dashoffset: 565.5;
      transition: stroke-dashoffset .05s linear;
    }
    .sos-ring-content {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
    }
    .sos-icon-wrap {
      width: 70px; height: 70px; background: rgba(255,255,255,0.15); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .sos-hint {
      font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
      color: rgba(255,255,255,0.55);
    }

    .sos-cancel {
      background: rgba(255,255,255,0.12); border: none; border-radius: 14px;
      width: 100%; padding: 13px;
      font-family: 'Barlow', sans-serif;
      font-size: 13px; font-weight: 700; letter-spacing: 1.5px; color: rgba(255,255,255,0.7);
      cursor: pointer; transition: background .12s;
    }
    .sos-cancel:active { background: rgba(255,255,255,0.2); }

    /* ══════════════════════════════════════
       SCREEN 3 — SENT CONFIRMATION
    ══════════════════════════════════════ */
    #screen-sent {
      background: #1C1C1E;
      justify-content: center; gap: 16px;
      padding: 36px 28px;
      cursor: pointer;
    }

    .sent-check {
      width: 88px; height: 88px; background: #00838F; border-radius: 26px;
      display: flex; align-items: center; justify-content: center;
      animation: pop-in .4s cubic-bezier(.34,1.56,.64,1) both;
      box-shadow: 0 0 32px rgba(0,131,143,0.45);
    }
    .sent-title {
      font-size: 22px; font-weight: 900; color: #fff; letter-spacing: .5px; text-align: center;
    }
    .sent-sub {
      font-size: 12px; color: rgba(255,255,255,0.5); text-align: center; line-height: 1.6;
    }
    .sent-tap {
      font-size: 9px; font-weight: 700; letter-spacing: 2px;
      color: rgba(255,255,255,0.2); text-transform: uppercase;
      position: absolute; bottom: 48px;
    }
  </style>
</head>
<body>
<div id="watch">

  <!-- Screen 1: Watch face -->
  <div class="watch-screen active" id="screen-face">
    <div class="wf-top">
      <div class="wf-logo">CHEN</div>
      <div class="wf-gps"><div class="gps-dot"></div>GPS</div>
    </div>

    <div class="wf-ring-wrap">
      <svg width="220" height="220" viewBox="0 0 220 220">
        <circle class="ring-bg"   cx="110" cy="110" r="100"/>
        <circle class="ring-fill" cx="110" cy="110" r="100" id="heatRing"/>
      </svg>
      <div class="wf-ring-content">
        <div class="wf-risk-label">HEAT STRESS</div>
        <div class="wf-pct">75<span style="font-size:22px;opacity:.6">%</span></div>
        <div class="wf-risk-level">HIGH RISK</div>
      </div>
    </div>

    <div class="wf-health">
      <div class="wf-health-left">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="#EF9A9A" stroke="#EF9A9A" stroke-width="1.5">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
        <div>
          <div class="wf-bpm">100 <span style="font-size:11px;opacity:.5">BPM</span></div>
          <div class="wf-bpm-label">HEART RATE</div>
        </div>
      </div>
      <div class="wf-ekg-mini">
        <svg viewBox="0 0 120 22" preserveAspectRatio="none">
          <g class="ekg-scroll-mini">
            <polyline class="ekg-line-mini" points="
              0,11 8,11 12,11 14,3 16,19 18,11 22,11
              30,11 34,11 36,3 38,19 40,11 44,11
              52,11 56,11 58,3 60,19 62,11 66,11
              74,11 78,11 80,3 82,19 84,11 88,11
              96,11 100,11 102,3 104,19 106,11 110,11
              118,11 120,11"/>
          </g>
        </svg>
      </div>
    </div>

    <button class="wf-sos" id="sosBtn">SOS</button>
  </div>

  <!-- Screen 2: SOS hold -->
  <div class="watch-screen" id="screen-sos">
    <div class="sos-label">HOLD TO SEND</div>

    <div class="sos-ring-wrap" id="sosRingWrap">
      <svg width="200" height="200" viewBox="0 0 200 200">
        <circle class="hold-bg"  cx="100" cy="100" r="90"/>
        <circle class="hold-arc" cx="100" cy="100" r="90" id="holdArc"/>
      </svg>
      <div class="sos-ring-content">
        <div class="sos-icon-wrap">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.35a2 2 0 0 1 1.98-2.18h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 9a16 16 0 0 0 6.09 6.09l.92-.92a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
        </div>
        <div class="sos-hint">HOLD</div>
      </div>
    </div>

    <button class="sos-cancel" id="sosCancelBtn">CANCEL</button>
  </div>

  <!-- Screen 3: Sent -->
  <div class="watch-screen" id="screen-sent">
    <div class="sent-check" id="sentCheck">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <div class="sent-title">Help is<br>coming</div>
    <div class="sent-sub">Emergency services notified.<br>Your location is being shared.</div>
    <div class="sent-tap">Tap to dismiss</div>
  </div>

</div>

<script>
  const SCREENS = {
    face: document.getElementById('screen-face'),
    sos:  document.getElementById('screen-sos'),
    sent: document.getElementById('screen-sent'),
  };
  let current = 'face';

  function goTo(id) {
    SCREENS[current].classList.remove('active');
    SCREENS[current].classList.add('exit');
    setTimeout(() => SCREENS[current].classList.remove('exit'), 250);

    current = id;
    SCREENS[id].classList.add('active');

    if (id === 'sent') {
      const check = document.getElementById('sentCheck');
      check.style.animation = 'none';
      void check.offsetWidth;
      check.style.animation = '';
    }
  }

  // ── Heat ring init ──
  const CIRC = 2 * Math.PI * 100; // r=100 → ~628.3
  const ring = document.getElementById('heatRing');
  ring.style.strokeDasharray  = CIRC;
  ring.style.strokeDashoffset = CIRC * (1 - 0.75);

  // ── SOS button → SOS hold screen ──
  document.getElementById('sosBtn').addEventListener('click', () => goTo('sos'));
  document.getElementById('sosCancelBtn').addEventListener('click', () => {
    cancelHold();
    goTo('face');
  });

  // ── Hold-to-send logic ──
  const HOLD_MS   = 2000;
  const holdArc   = document.getElementById('holdArc');
  const holdCirc  = 2 * Math.PI * 90; // r=90 → ~565.5
  holdArc.style.strokeDasharray  = holdCirc;
  holdArc.style.strokeDashoffset = holdCirc;

  let holdStart = null;
  let holdRaf   = null;

  function cancelHold() {
    if (holdRaf) { cancelAnimationFrame(holdRaf); holdRaf = null; }
    holdStart = null;
    holdArc.style.transition = 'stroke-dashoffset .25s ease';
    holdArc.style.strokeDashoffset = holdCirc;
    setTimeout(() => { holdArc.style.transition = ''; }, 260);
  }

  function tickHold(ts) {
    if (!holdStart) holdStart = ts;
    const progress = Math.min((ts - holdStart) / HOLD_MS, 1);
    holdArc.style.strokeDashoffset = holdCirc * (1 - progress);

    if (progress < 1) {
      holdRaf = requestAnimationFrame(tickHold);
    } else {
      holdRaf = null;
      holdArc.style.strokeDashoffset = 0;
      setTimeout(() => { cancelHold(); goTo('sent'); }, 120);
    }
  }

  const sosRingWrap = document.getElementById('sosRingWrap');

  function startHold() { holdRaf = requestAnimationFrame(tickHold); }
  function releaseHold() { if (holdStart) cancelHold(); }

  sosRingWrap.addEventListener('mousedown',  startHold);
  sosRingWrap.addEventListener('touchstart', startHold, { passive: true });
  sosRingWrap.addEventListener('mouseup',    releaseHold);
  sosRingWrap.addEventListener('mouseleave', releaseHold);
  sosRingWrap.addEventListener('touchend',   releaseHold);

  // ── Sent screen: tap to go back to face ──
  document.getElementById('screen-sent').addEventListener('click', () => goTo('face'));
</script>
</body>
</html>
