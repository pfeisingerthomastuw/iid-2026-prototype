<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <title>CHEN — Heat Alert</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=DM+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #1a1a1a;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow', sans-serif;
    }

    /* ── Phone shell ── */
    #app {
      width: 390px; height: 844px;
      background: linear-gradient(160deg, #C62828 0%, #6B0000 100%);
      position: relative; overflow: hidden;
      border-radius: 44px;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.25),
        0 40px 100px rgba(0,0,0,0.6);
      display: flex; flex-direction: column;
      animation: urgent-breathe 3s ease-in-out infinite;
    }
    @keyframes urgent-breathe {
      0%,100% { filter: brightness(1);    }
      50%      { filter: brightness(1.08); }
    }

    /* ── Top bar ── */
    .topbar {
      flex-shrink: 0; height: 50px;
      background: rgba(0,0,0,0.2);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex; align-items: center; padding: 0 18px; gap: 0;
    }
    .topbar-logo { font-weight: 900; font-size: 23px; color: #fff; letter-spacing: 3px; flex: 1; }
    .topbar-gps  {
      display: flex; align-items: center; gap: 5px;
      font-size: 10.5px; font-weight: 600;
      color: rgba(255,255,255,0.75); letter-spacing: .6px; margin-right: 12px;
    }
    .gps-dot {
      width: 7px; height: 7px; background: #4CAF50; border-radius: 50%;
      animation: pulse-gps 2.4s ease-in-out infinite;
    }
    @keyframes pulse-gps {
      0%,100% { box-shadow: 0 0 0 0   rgba(76,175,80,.5); }
      50%      { box-shadow: 0 0 0 4px rgba(76,175,80,0);  }
    }
    .topbar-avatar {
      width: 30px; height: 30px;
      background: rgba(255,255,255,0.15); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Main content ── */
    .content {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; padding: 28px 22px 18px;
    }

    /* ── Alert heading ── */
    .alert-header {
      display: flex; align-items: flex-start; gap: 14px;
      align-self: flex-start; margin-bottom: 14px;
    }
    .alert-header svg { flex-shrink: 0; margin-top: 4px; }
    .alert-title {
      font-size: 34px; font-weight: 900; line-height: 1.0;
      color: #fff; letter-spacing: .5px;
      text-shadow: 0 2px 16px rgba(0,0,0,0.2);
    }
    .alert-sub {
      font-size: 14px; font-weight: 500; line-height: 1.55;
      color: rgba(255,255,255,0.78); text-align: center;
      margin-bottom: 20px; padding: 0 4px;
    }

    /* ── Countdown circle ── */
    .circle-wrap {
      position: relative; width: 260px; height: 260px;
      flex-shrink: 0; margin-bottom: 24px;
    }
    .circle-wrap svg {
      width: 100%; height: 100%;
      transform: rotate(-90deg);
    }
    .ring-track {
      fill: none;
      stroke: rgba(255,255,255,0.15);
      stroke-width: 10;
    }
    .ring-arc {
      fill: none;
      stroke: #fff;
      stroke-width: 10;
      stroke-linecap: round;
      /* r=110 → C≈691; set via JS */
      transition: stroke-dashoffset 1s linear;
    }
    .circle-content {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 4px;
    }
    .count-num {
      font-family: 'DM Mono', monospace;
      font-size: 72px; font-weight: 700; line-height: 1;
      color: #fff;
      text-shadow: 0 4px 24px rgba(0,0,0,0.2);
    }
    .count-label {
      font-size: 13px; font-weight: 700; letter-spacing: 3px;
      color: rgba(255,255,255,0.65);
    }

    /* ── Action buttons ── */
    .actions { width: 100%; display: flex; flex-direction: column; gap: 0; }
    .btn-emergency {
      width: 100%; padding: 18px;
      background: #fff; border: none; border-radius: 14px;
      font-family: 'Barlow', sans-serif;
      font-size: 18px; font-weight: 900; letter-spacing: 2px;
      color: #C62828; cursor: pointer;
      box-shadow: 0 6px 24px rgba(0,0,0,0.25);
      transition: transform .12s, background .12s;
      margin-bottom: 14px;
    }
    .btn-emergency:active { transform: scale(.97); background: #f5f5f5; }
    .btn-cancel {
      background: none; border: none;
      font-family: 'Barlow', sans-serif;
      font-size: 13px; font-weight: 700; letter-spacing: 2px;
      color: rgba(255,255,255,0.75); cursor: pointer;
      text-decoration: underline; text-underline-offset: 3px;
      padding: 8px;
    }

    /* ── Bottom nav (matches prototype.html) ── */
    .bottom-nav {
      flex-shrink: 0; height: 68px;
      background: rgba(0,0,0,0.22);
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: space-around;
      padding: 0 12px 6px;
    }
    .nav-item  { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; }
    .nav-label { font-size: 10px; font-weight: 600; letter-spacing: .4px; color: rgba(255,255,255,0.5); }
    .alarm-pill {
      width: 50px; height: 50px; background: #fff; border-radius: 50%;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.3);
      transition: transform .12s;
    }
    .alarm-pill:active { transform: scale(.92); }
    .alarm-pill .nav-label { color: #C62828; font-size: 9px; }

    /* ── Sent state ── */
    .sent-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      opacity: 0; pointer-events: none;
      transition: opacity .3s;
      border-radius: 44px;
    }
    .sent-overlay.visible { opacity: 1; pointer-events: all; }
    .sent-check {
      width: 80px; height: 80px; background: #fff; border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      animation: pop-in .4s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes pop-in { from{transform:scale(.5);opacity:0} to{transform:scale(1);opacity:1} }
    .sent-text { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: 1px; }
    .sent-sub  { font-size: 13px; color: rgba(255,255,255,0.7); }
  </style>
</head>
<body>
<div id="app">

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-logo">CHEN</div>
    <div class="topbar-gps"><div class="gps-dot"></div>GPS ACTIVE</div>
    <div class="topbar-avatar">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2" stroke-linecap="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </div>
  </div>

  <!-- Main -->
  <div class="content">

    <div class="alert-header">
      <!-- Warning triangle -->
      <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        <line x1="12" y1="9"  x2="12" y2="13"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      <div class="alert-title">HEAT STRESS<br>DETECTED</div>
    </div>

    <p class="alert-sub">Critical core temperature threshold exceeded. Immediate cooling required.</p>

    <!-- Countdown -->
    <div class="circle-wrap">
      <svg viewBox="0 0 260 260">
        <circle class="ring-track" cx="130" cy="130" r="110"/>
        <circle class="ring-arc"   cx="130" cy="130" r="110" id="ringArc"/>
      </svg>
      <div class="circle-content">
        <div class="count-num" id="countNum">30</div>
        <div class="count-label">SECONDS</div>
      </div>
    </div>

    <!-- Buttons -->
    <div class="actions">
      <button class="btn-emergency" id="emergBtn">EMERGENCY HELP</button>
      <button class="btn-cancel"    id="cancelBtn">CANCEL</button>
    </div>

  </div>

  <!-- Bottom nav -->
  <div class="bottom-nav">
    <div class="nav-item" style="flex:1.2">
      <div class="alarm-pill">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#C62828" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
        <span class="nav-label">Alarm</span>
      </div>
    </div>
    <div class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6"  x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
      <span class="nav-label">Map</span>
    </div>
    <div class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8"  x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span class="nav-label">First Aid</span>
    </div>
  </div>

  <!-- Sent overlay (shown after emergency triggered) -->
  <div class="sent-overlay" id="sentOverlay">
    <div class="sent-check">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#C62828" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <div class="sent-text">Emergency Sent</div>
    <div class="sent-sub">Help is on the way</div>
  </div>

</div>

<script>
  const TOTAL   = 30;
  const R       = 110;
  const CIRC    = 2 * Math.PI * R; // ≈ 691.15

  const arcEl   = document.getElementById('ringArc');
  const numEl   = document.getElementById('countNum');
  const overlay = document.getElementById('sentOverlay');

  // Initialise arc
  arcEl.style.strokeDasharray  = CIRC;
  arcEl.style.strokeDashoffset = 0;

  let remaining = TOTAL;
  let timer     = null;
  let sent      = false;

  function setArc(n) {
    arcEl.style.strokeDashoffset = CIRC * (1 - n / TOTAL);
  }

  function triggerEmergency() {
    if (sent) return;
    sent = true;
    clearTimeout(timer);
    overlay.classList.add('visible');
  }

  function tick() {
    remaining--;
    numEl.textContent = remaining;
    setArc(remaining);

    if (remaining <= 0) {
      triggerEmergency();
    } else {
      timer = setTimeout(tick, 1000);
    }
  }

  // Start countdown after 1 s so first step is visible
  timer = setTimeout(tick, 1000);

  document.getElementById('emergBtn').addEventListener('click', triggerEmergency);
  document.getElementById('cancelBtn').addEventListener('click', () => {
    clearTimeout(timer);
    window.location.href = 'prototype.html';
  });

  // Tapping the sent overlay dismisses it → land on reported screen
  overlay.addEventListener('click', () => {
    window.location.href = 'prototype.html?start=reported';
  });
</script>
</body>
</html>
